[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
# Add your X Layer RPC endpoint here
# xlayer = "https://..."

[etherscan]
# Add your X Layer explorer API key here
# xlayer = { key = "", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/XLAYER" }

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
